################
### MONITOR  ###
################
monitor=Virtual-1,1632x829@75,0x0,1

################
### AUTOSTART ###
################
exec-once = waybar
exec-once = dunst
exec-once = swaybg -i /home/show/Pictures/wall.jpg -m fill
exec-once = /usr/bin/spice-vdagent
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = ~/clipboard-bridge-v2.sh

################
### ENV VARS ###
################
env = WLR_RENDERER_ALLOW_SOFTWARE,1
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland
env = XCURSOR_SIZE,24

################
### INPUT    ###
################
input {
    kb_layout = es
    follow_mouse = 1
    sensitivity = 0
    repeat_rate = 25
    repeat_delay = 600

    touchpad {
        natural_scroll = no
    }
}

################
### APARIENCIA (Fine-Tuning) ###
################
general {
    gaps_in = 6            # Simetría con el padding de Waybar
    gaps_out = 12          # Respiro visual consistente
    border_size = 2
    
    # Borde activo: Gradiente Oro (f5c06a) y Oro Dim (d8a657)
    col.active_border   = rgba(f5c06aff) rgba(d8a657ff) 45deg
    # Borde inactivo: Gris oscuro (bg_light) con transparencia
    col.inactive_border = rgba(1d2021aa)
    
    layout = dwindle
}

decoration {
    rounding = 12          # Coincide exactamente con el radio de Waybar
    active_opacity   = 1.0
    inactive_opacity = 0.92
    
    blur {
        enabled  = true
        size     = 6
        passes   = 3       # Blur más suave y profesional
        new_optimizations = true
        ignore_opacity = true
    }

    # Sombra: Profundidad usando el negro café (bg_dark)
    drop_shadow = yes
    shadow_range = 15
    shadow_render_power = 3
    col.shadow = rgba(14121066)
}

animations {
    enabled = true
    bezier = expo, 0.16, 1, 0.3, 1
    # Animaciones cinemáticas y suaves
    animation = windows,    1, 5, expo, slide
    animation = windowsOut, 1, 5, expo, slide
    animation = fade,       1, 7, expo
    animation = workspaces, 1, 5, expo, slidefade 20%
}

dwindle {
    pseudotile     = true
    preserve_split = true
}

misc {
    disable_hyprland_logo    = true
    disable_splash_rendering = true
    force_default_wallpaper  = 0
    mouse_move_enables_dpms = true
}

################
### LAYERRULES (El efecto Cristal) ###
################
layerrule = blur, waybar
layerrule = ignorezero, waybar
layerrule = blur, wofi
layerrule = ignorealpha, wofi

################
### KEYBINDS ###
################
$mod = SUPER

bind = $mod,       Return, exec,           foot
bind = $mod,       Space,  exec,           wofi --show drun
bind = $mod SHIFT, S,      exec,           grim -g "$(slurp)" ~/screenshot_$(date +%s).png
bind = $mod,       Q,      killactive
bind = $mod,       F,      fullscreen,     0
bind = $mod SHIFT, F,      togglefloating
bind = $mod,       M,      exit

# Foco de ventanas
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5

# Mover ventanas a Workspaces
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

# Ratón y Recarga
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
bind = $mod SHIFT, R, exec, hyprctl reload
bind = $mod SHIFT, E, exec, wlogout -b 3 -s /home/show/.config/wlogout/style.css -l /home/show/.config/wlogout/layout

################
### SCRIPTS & VM ###
################
#cursor {
#    no_hardware_cursors = true
#}

exec = ~/.config/hypr/scripts/spice-auto.sh
